name: Deploy to Dokku

# Gate deploys on tests: run only after the "Test" workflow completes on main,
# and only if it succeeded. (workflow_run uses the workflow definition from the
# default branch.)
on:
  workflow_run:
    workflows: ['Test']
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Deploy the exact commit that was tested.
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: dokku/github-action@master
        with:
          ssh_private_key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}
          git_remote_url: ssh://dokku@${{ secrets.DOKKU_HOST }}:22/${{ secrets.DOKKU_APP_NAME }}
          git_push_flags: '--force'
          branch: main
